services:
  nginx:
    image: nginx:1.27-alpine
    container_name: doit-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server: 
        condition: service_started
    networks: 
      - public_net
  postgres:
    image: postgres:17-alpine
    container_name: doit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: doit
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - 5432
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doit || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private_net
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: doit-server
    restart: unless-stopped
    expose:
      - 8086
    environment:
      PORT: 8086
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: doit
      DATABASE_URL: postgresql://postgres:admin@postgres:5432/doit
    depends_on:
      postgres: 
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - public_net
      - private_net

networks:
  public_net:
    driver: bridge
  private_net:
    internal: true
    driver: bridge