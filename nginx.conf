events {
    worker_connections 1024;  # Max simultaneous connections per worker
}

http {

    # ─── UPSTREAM ──────────────────────────────────────────────────
    upstream backend {
        server server:8086;  # Docker internal DNS — matches your compose service name
    }

    # ─── RATE LIMITING ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ─── SERVER BLOCK ──────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ─── SECURITY HEADERS ──────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # ─── PROXY TO BACKEND ──────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;        # Forwards to upstream block above

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;   # Passes real client IP
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";              # Enables keep-alive
        }

        # ─── TIMEOUTS ──────────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}